syntax = "proto3";

package distributedrf;

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  RUNNING = 2;
  VALIDATING = 3;
  COMPLETED = 4;
  FAILED = 5;
}

message DenseMatrix {
  repeated double values = 1;
  int32 n_rows = 2;
  int32 n_cols = 3;
}

message RegisterWorkerRequest {
  string worker_id = 1;
  string host = 2;
  int32 port = 3;
}

message RegisterWorkerResponse {
  bool accepted = 1;
  string message = 2;
}

message HeartbeatRequest {
  string worker_id = 1;
  int32 running_tasks = 2;
  repeated string active_task_ids = 3;
}

message HeartbeatResponse {
  bool ok = 1;
}

message SubmitTrainingRequest {
  string dataset_url = 1;
  string target_column = 2;
  string task_type = 3;     // classification | regression
  int32 n_estimators_total = 4;
  double validation_ratio = 5;
  double test_ratio = 6;
  bool bootstrap = 7;
  int32 global_random_seed = 8;

  // JSON or repeated fields can later replace this simplified bootstrap version.
  repeated int32 max_depth_candidates = 9;
  repeated string max_features_candidates = 10;
  repeated int32 min_samples_split_candidates = 11;
  repeated int32 min_samples_leaf_candidates = 12;
  repeated string criterion_candidates = 13;
}

message SubmitTrainingResponse {
  string job_id = 1;
  JobStatus status = 2;
  string message = 3;
}

message TrainedTreeArtifact {
  string tree_id = 1;
  string experiment_id = 2;
  int32 tree_index = 3;
  string artifact_uri = 4;
  string worker_id = 5;
  int32 seed = 6;
}

message TrainShardRequest {
  string task_id = 1;
  int32 attempt_id = 2;
  string job_id = 3;
  string experiment_id = 4;
  string assigned_worker_id = 5;

  int32 tree_start_index = 6;
  int32 tree_count = 7;

  string task_type = 8;
  int32 n_estimators = 9;
  int32 max_depth = 10;
  string max_features = 11;
  int32 min_samples_split = 12;
  int32 min_samples_leaf = 13;
  string criterion = 14;
  bool bootstrap = 15;
  int32 global_random_seed = 16;

  string train_features_uri = 17;
  string train_labels_uri = 18;
  string artifact_output_dir = 19;
  int32 seed_base = 20;
  int64 lease_expires_at_unix_ms = 21;
}

message TrainShardResponse {
  string task_id = 1;
  int32 attempt_id = 2;
  string worker_id = 3;
  bool success = 4;
  string error = 5;
  repeated TrainedTreeArtifact artifacts = 6;
  repeated string completed_tree_ids = 7;
  repeated string failed_tree_ids = 8;
  double elapsed_time_seconds = 9;
}

message PredictShardRequest {
  string model_id = 1;
  string experiment_id = 2;
  string task_type = 3;
  DenseMatrix features = 4;
  repeated string tree_artifact_uris = 5;
  repeated string class_labels = 6;
}

message PredictShardResponse {
  string worker_id = 1;
  bool success = 2;
  string error = 3;
  repeated double values = 4;
  int32 n_rows = 5;
  int32 n_cols = 6;
}

service CoordinatorService {
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc SubmitTraining(SubmitTrainingRequest) returns (SubmitTrainingResponse);
}

service WorkerService {
  rpc TrainShard(TrainShardRequest) returns (TrainShardResponse);
  rpc PredictShard(PredictShardRequest) returns (PredictShardResponse);
}
